<!DOCTYPE html>
<html>

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style.css">
        <title>A Weather App</title>
</head>

<body>
       <div class="container">
               <div class="weather-container">
                       <div class="temp">
                               <p>21</p>
                       </div>
                       <div class="time-location">
                               <p>delhi</p>
                               <p>12:58 - Monday - 2022 - 09 - 26</p>
                       </div>
                       <div class="condition">
                               <p></p>
                               <p>mist</p>
                       </div>
               </div>
               
       </div> 
       <nav>
              <form>
                      <input type="text" placeholder="search for a location" class="search-area">
                      <button type="submit">Search</button>
              </form>
       </nav>
        
        <script src="script.js"></script>
</body>

</html>
